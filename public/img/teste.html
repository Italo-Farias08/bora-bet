<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dice</title>
<style>
  body {
    background: #14151a;
    color: #eee;
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 40px;
  }
  h1 { color: #7fff7f; }
  #saldo { font-size: 20px; margin-bottom: 20px; }
  .painel {
    background: #22232c;
    padding: 20px;
    border-radius: 10px;
    width: 280px;
  }
  label { display: block; margin-top: 10px; font-size: 14px; color: #aaa; }
  input {
    width: 100%;
    padding: 8px;
    margin-top: 4px;
    border-radius: 5px;
    border: none;
    background: #333;
    color: #fff;
    box-sizing: border-box;
  }
  button {
    margin-top: 15px;
    width: 100%;
    padding: 10px;
    background: #7fff7f;
    border: none;
    border-radius: 5px;
    font-weight: bold;
    cursor: pointer;
  }
  #resultado {
    margin-top: 20px;
    font-size: 32px;
    font-weight: bold;
  }
  #mensagem { margin-top: 10px; font-size: 14px; }
  .ganhou { color: #7fff7f; }
  .perdeu { color: #ff6b6b; }
</style>
</head>
<body>

<h1>🎲 Dice</h1>
<div id="saldo">Saldo: R$ 100.00</div>

<div class="painel">
  <label>Aposta (R$)</label>
  <input type="number" id="aposta" value="10" min="1">

  <label>Role ACIMA de: <span id="valorAlvo">50</span></label>
  <input type="range" id="alvo" min="2" max="98" value="50">

  <label>Multiplicador: <span id="multiplicador">1.98x</span> | Chance: <span id="chance">50%</span></label>

  <button onclick="jogar()">ROLAR</button>
</div>

<div id="resultado">--</div>
<div id="mensagem"></div>

<script>
let saldo = 100;

const alvoInput = document.getElementById('alvo');
const valorAlvo = document.getElementById('valorAlvo');
const multiplicadorEl = document.getElementById('multiplicador');
const chanceEl = document.getElementById('chance');

function atualizarInfo() {
  const alvo = parseInt(alvoInput.value);
  valorAlvo.textContent = alvo;
  const chance = 100 - alvo; // chance de rolar acima do alvo
  const multiplicador = (99 / chance).toFixed(2); // 1% de margem da casa
  chanceEl.textContent = chance + '%';
  multiplicadorEl.textContent = multiplicador + 'x';
}
alvoInput.addEventListener('input', atualizarInfo);
atualizarInfo();

function jogar() {
  const aposta = parseFloat(document.getElementById('aposta').value);
  const alvo = parseInt(alvoInput.value);

  if (aposta <= 0 || aposta > saldo) {
    document.getElementById('mensagem').textContent = 'Aposta inválida!';
    return;
  }

  const dado = (Math.random() * 100).toFixed(2);
  const chance = 100 - alvo;
  const multiplicador = 99 / chance;

  document.getElementById('resultado').textContent = dado;

  const msg = document.getElementById('mensagem');

  if (parseFloat(dado) > alvo) {
    const ganho = aposta * multiplicador;
    saldo += ganho - aposta;
    msg.textContent = `Ganhou! +R$ ${(ganho - aposta).toFixed(2)}`;
    msg.className = 'ganhou';
  } else {
    saldo -= aposta;
    msg.textContent = `Perdeu! -R$ ${aposta.toFixed(2)}`;
    msg.className = 'perdeu';
  }

  document.getElementById('saldo').textContent = 'Saldo: R$ ' + saldo.toFixed(2);
}
</script>

</body>
</html>
